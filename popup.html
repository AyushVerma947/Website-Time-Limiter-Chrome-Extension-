<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      width: 320px;
      padding: 14px;
      background: #f3f4f6;
      margin: 0;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 6px;
      border-bottom: 1px solid #eee;
    }

    .row:last-child {
      border-bottom: none;
    }

    .site {
      font-size: 14px;
      color: #111;
    }

    .input-box {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .input-box input {
      width: 50px;
      padding: 4px;
      border: 1px solid #ddd;
      border-radius: 6px;
      text-align: center;
    }

    .unit {
      font-size: 12px;
      color: #666;
    }

    .add-section {
      margin-top: 12px;
      display: flex;
      gap: 6px;
    }

    .add-section input {
      flex: 1;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    button {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button:hover {
      background: #1d4ed8;
    }
    button {
  transition: 0.2s;
}

button:hover {
  opacity: 0.8;
}
  </style>
</head>

<body>

<h3>⏳ Limits</h3>

<div class="card" id="list"></div>

<div class="add-section">
  <input id="site" placeholder="example.com">
  <input id="limit" type="number" placeholder="Min">
</div>

<button id="add">Add Site</button>

<script src="popup.js"></script>
</body>
</html>
